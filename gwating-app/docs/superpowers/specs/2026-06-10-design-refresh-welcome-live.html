<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>부팅 — 웰컴 라이브 프로토타입</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');
:root{
  --paper:#FAF7F2;--ink:#1B1916;--muted:#8E887E;--line:rgba(27,25,22,.08);
  --g1:#FF3D5A;--g2:#FF7A3D;--grad:linear-gradient(120deg,#FF3D5A,#FF7A3D);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{height:100%}
body{
  font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;
  background:
    radial-gradient(900px 500px at 75% -10%, rgba(255,61,90,.08), transparent 60%),
    radial-gradient(700px 500px at 10% 110%, rgba(201,184,255,.06), transparent 60%),
    #131110;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 16px;gap:18px;
}
.deck-label{font-size:11px;font-weight:700;letter-spacing:3.5px;color:#8E887E}
.gt{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}

/* ---------- 데스크톱 모바일 프레임 (스펙: 중앙 420px) ---------- */
.frame{
  width:min(420px, 100vw - 32px);
  height:min(860px, calc(100vh - 120px));
  min-height:600px;
  border-radius:52px;position:relative;overflow:hidden;
  background:var(--paper);
  box-shadow:0 0 0 10px #2A2520,0 0 0 11px #45403a,0 44px 90px rgba(0,0,0,.65);
}
@media (max-width:480px){
  body{padding:0}
  .frame{width:100vw;height:100vh;min-height:0;border-radius:0;box-shadow:none}
  .deck-label,.replay{display:none}
}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;padding:0 28px;overflow:hidden}
.island{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:110px;height:30px;border-radius:18px;background:#16130f;z-index:30}
.sb{display:flex;justify-content:space-between;align-items:center;padding:19px 2px 0;font-size:14px;font-weight:700;color:var(--ink);position:relative;z-index:20}
.sb .icons{display:flex;gap:5px;align-items:center}
.sb .icons i{display:block;background:currentColor}
.sb .icons .s1{width:17px;height:11px;clip-path:polygon(0 100%,100% 0,100% 100%);border-radius:1px}
.sb .icons .s2{width:23px;height:11px;border-radius:3.5px}
.homebar{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:135px;height:5px;border-radius:3px;background:rgba(27,25,22,.22);z-index:30}

/* ---------- 오로라 ---------- */
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(20px,-24px) scale(1.15)}}
.blob{position:absolute;border-radius:50%;filter:blur(58px);pointer-events:none;animation:drift 10s ease-in-out infinite alternate}

/* ---------- 엔트런스 ---------- */
@keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes boltIn{0%{opacity:0;transform:scale(.3) rotate(-14deg)}65%{transform:scale(1.18) rotate(4deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes glowBreathe{0%,100%{box-shadow:0 18px 36px rgba(27,25,22,.24)}50%{box-shadow:0 18px 44px rgba(255,77,61,.28)}}
.in{animation:up .9s cubic-bezier(.22,1,.36,1) both}

/* ---------- 콘텐츠 ---------- */
.brand{display:flex;align-items:center;gap:9px;margin-top:34px}
.brand svg{animation:boltIn .7s .25s cubic-bezier(.34,1.56,.64,1) both}
.brand b{font-size:21px;font-weight:900;letter-spacing:-.6px;color:var(--ink)}
.hero{margin-top:auto;margin-bottom:auto}
.hero h1{font-size:clamp(34px,9.5vw,42px);font-weight:900;letter-spacing:-1.8px;line-height:1.22;color:var(--ink)}
.hero h1 span{display:block}
.hero .sub{margin-top:18px;font-size:15px;line-height:1.75;color:var(--muted);font-weight:500}
.cta-zone{margin-bottom:56px;display:flex;flex-direction:column;gap:18px}
.btn-ink{
  height:60px;border-radius:20px;background:var(--ink);color:#fff;
  font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;
  cursor:pointer;user-select:none;border:none;font-family:inherit;
  animation:glowBreathe 3.2s ease-in-out infinite;
  transition:transform .12s ease,box-shadow .12s ease;
}
.btn-ink:active{transform:scale(.965);box-shadow:0 8px 16px rgba(27,25,22,.2)!important}
.ghostlink{text-align:center;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;user-select:none;transition:transform .12s ease}
.ghostlink:active{transform:scale(.96)}
.ghostlink b{color:#E5402E;font-weight:800}

.replay{
  font-family:inherit;font-size:12px;font-weight:700;color:#C9C3B8;
  background:rgba(237,233,226,.06);border:1px solid rgba(237,233,226,.16);
  border-radius:999px;padding:9px 20px;cursor:pointer;transition:background .15s;
}
.replay:hover{background:rgba(237,233,226,.12)}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<div class="deck-label">WELCOME · LIVE PROTOTYPE — 데스크톱 모바일 프레임 적용</div>

<div class="frame">
  <div class="screen">
    <div class="blob" style="width:340px;height:340px;top:-100px;right:-120px;background:rgba(255,61,90,.15)"></div>
    <div class="blob" style="width:280px;height:280px;top:300px;left:-130px;background:rgba(201,184,255,.20);animation-delay:-4s"></div>
    <div class="blob" style="width:240px;height:240px;bottom:-90px;right:-70px;background:rgba(255,122,61,.10);animation-delay:-7s"></div>

    <div class="island"></div>
    <div class="sb"><span>9:41</span><span class="icons"><i class="s1"></i><i class="s2"></i></span></div>

    <div class="brand in" style="animation-delay:.15s">
      <svg width="24" height="24" viewBox="0 0 24 24"><path d="M13 2L4.5 13.5h5.5L9 22l8.5-11.5H12L13 2z" fill="#1B1916"/></svg>
      <b>부팅</b>
    </div>

    <div class="hero">
      <h1>
        <span class="in" style="animation-delay:.5s">연애세포,</span>
        <span class="in" style="animation-delay:.68s">다시 <em class="gt" style="font-style:normal">부팅</em>할</span>
        <span class="in" style="animation-delay:.86s">시간.</span>
      </h1>
      <p class="sub in" style="animation-delay:1.1s">
        부산대생 팀 과팅 · 프로필 비공개<br>
        매칭부터 시간·장소까지 자동 확정
      </p>
    </div>

    <div class="cta-zone">
      <button class="btn-ink in" style="animation-delay:1.35s">
        시작하기
        <svg width="16" height="16" viewBox="0 0 24 24"><path d="M13 2L4.5 13.5h5.5L9 22l8.5-11.5H12L13 2z" fill="url(#gx)"/><defs><linearGradient id="gx" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FF3D5A"/><stop offset="1" stop-color="#FF7A3D"/></linearGradient></defs></svg>
      </button>
      <div class="ghostlink in" style="animation-delay:1.55s">팀 초대를 받으셨나요? <b>코드로 합류 →</b></div>
    </div>

    <div class="homebar"></div>
  </div>
</div>

<button class="replay" onclick="location.reload()">⟳ 처음부터 다시 재생</button>

</body>
</html>
